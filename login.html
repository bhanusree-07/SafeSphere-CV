<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SafeSphere</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="login-container">

<div class="left">

<div class="overlay">

<h1><i class="fa-solid fa-shield-halved"></i> SafeSphere</h1>

<p>
AI Powered Industrial Safety Monitoring
</p>

<img src="https://cdn-icons-png.flaticon.com/512/2942/2942813.png">

<h3>Real-Time PPE Detection</h3>

</div>

</div>


<div class="right">

<form action="dashboard.html">

<h2>Welcome Back</h2>

<p>Login to continue</p>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
placeholder="Email"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password"
placeholder="Password"
required>

</div>

<button>Login</button>

<p>

Don't have an account?

<a href="signup.html">Sign Up</a>

</p>

</form>

</div>

</div>

</body>
</html>
