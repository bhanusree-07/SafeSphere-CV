<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SafeSphere</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<link rel="stylesheet" href="css/auth.css">

</head>


<body>


<div class="auth-page">


<!-- LEFT SIDE -->

<div class="visual-section">


<div class="brand">

<i class="fa-solid fa-shield-halved"></i>

<h1>SafeSphere</h1>

</div>


<h2>
Smart Industrial
<br>
Safety Monitoring
</h2>


<p>
AI powered PPE detection,
worker verification and
real-time safety analytics.
</p>


<div class="circle-card">

<i class="fa-solid fa-camera"></i>

<span>
AI Vision Monitoring
</span>

</div>


<div class="circle-card">

<i class="fa-solid fa-helmet-safety"></i>

<span>
PPE Compliance
</span>

</div>


</div>




<!-- LOGIN CARD -->


<div class="form-section">


<div class="auth-card">


<h2>
Welcome Back
</h2>


<p>
Login to your SafeSphere account
</p>



<form action="dashboard.html">


<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
placeholder="Email address"
required>

</div>



<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password"
placeholder="Password"
required>

</div>



<div class="options">

<label>

<input type="checkbox">

Remember me

</label>


<a href="#">
Forgot Password?
</a>


</div>



<button>

Login

</button>



<div class="bottom-text">

Don't have an account?

<a href="signup.html">
Sign Up
</a>


</div>



</form>


</div>


</div>


</div>


</body>

</html>
