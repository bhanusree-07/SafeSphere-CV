<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeSphere Login</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<link rel="stylesheet" href="css/auth.css">

</head>


<body>


<div class="page">


<!-- LEFT IMAGE AREA -->

<section class="hero">


<div class="logo">

<i class="fa-solid fa-shield-halved"></i>

SafeSphere

</div>



<div class="content">


<h1>
Future of
<br>
Industrial Safety
</h1>


<p>
AI powered PPE detection,
smart monitoring and workplace
security analytics.
</p>



<div class="features">


<div>
<i class="fa-solid fa-helmet-safety"></i>
PPE Detection
</div>


<div>
<i class="fa-solid fa-video"></i>
Live Monitoring
</div>


<div>
<i class="fa-solid fa-user-shield"></i>
Worker Safety
</div>


</div>


</div>


<div class="photo-card">


<img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=900&q=80">


</div>



</section>






<!-- LOGIN -->


<section class="login-area">


<div class="card">


<h2>
Welcome Back
</h2>


<p>
Login to access SafeSphere dashboard
</p>



<form action="dashboard.html">


<div class="input">

<i class="fa-solid fa-envelope"></i>

<input type="email"
placeholder="Email Address">

</div>



<div class="input">

<i class="fa-solid fa-lock"></i>

<input type="password"
placeholder="Password">

</div>



<div class="remember">

<label>

<input type="checkbox">

Remember me

</label>


<a href="#">
Forgot?
</a>

</div>



<button>

Login

</button>



<div class="signup">

New user?

<a href="signup.html">
Create Account
</a>

</div>



</form>



</div>



</section>



</div>


</body>

</html>
